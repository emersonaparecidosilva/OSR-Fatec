name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/3 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit
        run: |
          echo "Enviando requisição..."

          status=$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 60 \
            --user-agent "Mozilla/5.0" \
            --output /dev/null \
            --write-out "%{http_code}" \
            https://osr-fatec.streamlit.app || echo "ERRO")

          echo "Status recebido: $status"

          # Apenas registra; não derruba o workflow
          if [[ "$status" == "ERRO" ]]; then
            echo "Falha na conexão"
          elif [[ "$status" =~ ^(200|302|303)$ ]]; then
            echo "Resposta válida"
          else
            echo "Código inesperado: $status"
          fi
