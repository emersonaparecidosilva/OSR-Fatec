name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit
        run: |
          echo "Enviando ping..."

          status=$(curl \
            --silent \
            --head \
            --max-time 30 \
            --output /dev/null \
            --write-out "%{http_code}" \
            --user-agent "Mozilla/5.0" \
            https://osr-fatec.streamlit.app)

          echo "Status: $status"

          if [[ "$status" =~ ^(200|301|302|303)$ ]]; then
              echo "Ping executado"
          else
              echo "Resposta inesperada: $status"
          fi
