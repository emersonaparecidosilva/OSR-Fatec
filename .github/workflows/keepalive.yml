name: Keep Streamlit Awake

on:
  schedule:
    # Executa a cada 30 minutos
    - cron: "*/5 * * * *"

  # Permite rodar manualmente também
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Send request to Streamlit app
        run: |
          curl -L -s -o /dev/null -w "Status: %{http_code}\n" \
          http://osr-fatec.streamlit.app/
